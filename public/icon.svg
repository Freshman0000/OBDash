<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#ff1111" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1111"/>
      <stop offset="100%" stop-color="#ff1111" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="url(#ringGlow)" />
  
  <circle cx="256" cy="256" r="200" fill="none" stroke="#222" stroke-width="20" stroke-dasharray="10 10"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ff1111" stroke-width="4" stroke-dasharray="1 100" stroke-linecap="round"/>
  
  <path d="M 116 396 A 200 200 0 1 1 396 396" fill="none" stroke="#ff1111" stroke-width="8" stroke-dasharray="800" stroke-dashoffset="300" stroke-linecap="round"/>
  
  <!-- Needle -->
  <polygon points="256,256 240,290 380,132 272,240" fill="url(#needle)" />
  
  <circle cx="256" cy="256" r="40" fill="#111" stroke="#ff1111" stroke-width="4"/>
  <circle cx="256" cy="256" r="20" fill="#ff1111"/>
  
  <text x="256" y="440" font-family="'Orbitron', sans-serif" font-size="48" font-weight="900" font-style="italic" fill="#fff" text-anchor="middle" letter-spacing="8">OBDash</text>
  <text x="256" y="480" font-family="sans-serif" font-size="16" font-weight="bold" fill="#666" text-anchor="middle" letter-spacing="12">TELEMETRY</text>
</svg>
